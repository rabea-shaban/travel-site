<!doctype html>
<html>
  <head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </nav>

    <div class="container">
      <h1>Contact Us</h1>
      <p>
        We'd love to hear from you! Reach out to us through any of the following
        methods:
      </p>

      <div class="contact-info">
        <div class="info-item">
          <p>
            <strong>📍 Address:</strong> 123 Travel Lane, Adventure City, World
          </p>
        </div>
        <div class="info-item">
          <p><strong>📧 Email:</strong> support@travelrecommend.com</p>
        </div>
        <div class="info-item">
          <p><strong>📞 Phone:</strong> +1 (555) 123-4567</p>
        </div>
        <div class="info-item">
          <p><strong>⏰ Hours:</strong> Mon - Fri: 9:00 AM - 6:00 PM</p>
        </div>
      </div>

      <form
        id="contactForm"
        onsubmit="
          event.preventDefault();
          alert('Message sent successfully!');
        "
      >
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <textarea
          placeholder="How can we help you?"
          rows="5"
          required
        ></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </body>
</html>
